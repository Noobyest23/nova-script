<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Nova Engine Documentation</title>
	<link rel="icon" href="Images/script-icon.png" type="image/png">
	<link rel="">
	<link rel="stylesheet" href="Common/docs.css">

	<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
	<div class="bg-image"></div>
	<div class="layout">
		<nav>
			<div class="logo">
				<img src="Images/script-icon.png" alt="Nova Script Logo">
			</div>
			<h2>Navigation</h2>
			<ul>
				<li><a href="#index" data-page="index">Home</a></li>
				<li><a href="#getting-started" data-page="getting-started">Getting Started</a></li>
				<li><a href="#keywords" data-page="keywords">Keywords</a></li>
				<li><a href="#types" data-page="types">Types</a></li>
				<li class="nav-dropdown">
					<details>
						<summary>Syntax</summary>
						<ul>
							<li><a href="#syntax-expressions" data-page="syntax-expressions">Expressions</a></li>
							<li><a href="#syntax-statements" data-page="syntax-statements">Statements</a></li>
						</ul>
					</details>
				</li>
				<li class="nav-dropdown">
					<details>
						<summary>Modules</summary>
						<ul>
							<li><a href="#module-global" data-page="module-global">Global module</a></li>
							<li><a href="#module-io" data-page="module-io">IO module</a></li>
							<li><a href="#module-math" data-page="module-math">Math module</a></li>
							<li><a href="#module-os" data-page="module-os">OS module</a></li>
						</ul>
					</details>
				</li>
				<li class="nav-dropdown">
					<details>
						<summary>Extending NovaScript</summary>
						<ul>
							<li><a href="#creating-modules" data-page="creating-modules">Creating Modules</a></li>
							<li><a href="#creating-types" data-page="creating-types">Creating Types</a></li>
						</ul>
					</details>
				</li>
			</ul>

			<div class="sidebar-footer">
				<hr> <a href="https://discord.gg/s7Axx58VDv" target="_blank" class="report-btn">
					Report a Problem
				</a>
				<button id="toggle-btn">Toggle Background</button>
			</div>
		</nav>
		<main id="content">
			<!-- Content will be loaded here -->
		</main>
	</div>
	<script src="docs-content.js"></script>
	<script>
		// SPA content loader (no fetch, uses window.DOCS_CONTENT)
		const pageMap = {
// Generated by patch.py
            'changelog': 'changelog',
            'creating-modules': 'creating-modules',
            'creating-types': 'creating-types',
            'getting-started': 'getting-started',
            'index': 'index',
            'keywords': 'keywords',
            'module-global': 'module-global',
            'module-io': 'module-io',
            'module-math': 'module-math',
            'module-os': 'module-os',
            'syntax-expressions': 'syntax-expressions',
            'syntax-statements': 'syntax-statements',
            'types': 'types'
        };

		function loadPage(page) {
			const key = pageMap[page] || pageMap['index'];
			document.getElementById('content').innerHTML = window.DOCS_CONTENT[key] || '<section><h1>Not Found</h1></section>';
			if (window.hljs) hljs.highlightAll();
			document.querySelectorAll('h2 code').forEach((el) => {
				hljs.highlightElement(el);
			});
		}

		function handleNav(e) {
			const link = e.target.closest('a'); // Better than e.target for nested icons/tags
			if (!link) return;

			const page = link.getAttribute('data-page');
			const href = link.getAttribute('href');

			// If it's a page link (has data-page), handle SPA loading
			if (page) {
				e.preventDefault();
				window.location.hash = page;
				loadPage(page);
			}
			// If it's just an anchor link (starts with # and no data-page), 
			// let the browser handle it naturally.
			else if (href && href.startsWith('#')) {
				// Do nothing, let the browser jump to the ID
			}
		}

		document.querySelector('nav').addEventListener('click', handleNav);

		window.addEventListener('hashchange', () => {
			const hash = window.location.hash.replace('#', '');

			// Only reload the page content if the hash is a known SPA page
			// Otherwise, let the browser just scroll to the ID
			if (pageMap[hash]) {
				loadPage(hash);
			}
		});

		// Initial load
		const initialPage = window.location.hash.replace('#', '') || 'index';
		loadPage(initialPage);

		// Toggle Background Functionality with Fading
		const toggleBtn = document.getElementById('toggle-btn');
		const bgImage = document.querySelector('.bg-image');

		toggleBtn.addEventListener('click', () => {
			// This adds the class if it's missing, and removes it if it's there
			bgImage.classList.toggle('hidden');

			// Optional: Log status to console for debugging
			if (bgImage.classList.contains('hidden')) {
				console.log("Background Faded Out");
			} else {
				console.log("Background Faded In");
			}
		});
	</script>
</body>

</html>
